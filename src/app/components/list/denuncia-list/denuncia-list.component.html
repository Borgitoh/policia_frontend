
<div class="bg-gray-50 min-h-screen flex flex-col"  *ngIf="!isModalOpen" [@fadeInOut]> 
    <div class="flex-1 container mx-auto px-6 py-8">
        <div class="flex justify-between">
            <h1 class="text-3xl font-bold text-gray-800 mb-6">Registro de Queixa ou Participação</h1>
      <button (click)="openCrime()"
      class="bg-blue-500 text-white rounded-full px-4 py-2 flex items-center gap-2 dark:hover:bg-dark-primary">
      <lucide-icon name="plus" class="w-5 h-5"></lucide-icon>
     Novo Registro
    </button> </div>
      
      <!-- Report Filters -->
      <div  class="bg-white shadow-md rounded-lg p-6">
          <form class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
              <div>
                  <label for="date-start" class="block text-sm font-medium text-gray-700">Data de Início</label>
                  <input type="date" id="date-start" class="flex h-9 w-full rounded-md focus:border-blue-500 border border-input bg-transparent px-3 py-1 text-sm shadow-sm transition-colors file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50">
              </div>
              <div>
                  <label for="date-end" class="block text-sm font-medium text-gray-700">Data de Fim</label>
                  <input type="date" id="date-end" class="flex h-9 w-full rounded-md focus:border-blue-500 border border-input bg-transparent px-3 py-1 text-sm shadow-sm transition-colors file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50">
              </div>
              <div>
                  <label for="category" class="block text-sm font-medium text-gray-700">Categoria</label>
                  <select id="category" name="category" [(ngModel)]="selectedCategory" (change)="filterByCategory()" 
                  class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm">
                        <option value="">Selecione uma categoria</option>
                        <option value="Queixa">Queixa</option>
                        <option value="Participação">Participação</option>
              </select>
              </div>
              <div class="col-span-1 sm:col-span-2 lg:col-span-3">
                  <button type="submit" class="mt-4 w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">Pesquisar</button>
              </div>
          </form>
          
          <div class=" p-6">
            <h2 class="text-xl font-semibold text-gray-700 mb-4">Relatórios Gerados</h2>
            <table class="w-full border-collapse border border-gray-200">
                <thead class="bg-blue-600 text-white">
                    <tr>
                        <th class="px-4 py-2 text-left">Data</th>
                        <th class="px-4 py-2 text-left">Nome</th>
                        <th class="px-4 py-2 text-left">Categoria</th>
                        <th class="px-4 py-2 text-left">Ação</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                    <tr *ngFor="let item of filteredRegistos">
                        <td class="px-4 py-2">{{item.data}}</td>
                        <td class="px-4 py-2">{{item.nome}}s</td>
                        <td class="px-4 py-2">{{item.tipo}}</td>
                        <td class="px-4 py-2">
                            <button class="bg-green-600 text-white py-1 px-3 rounded hover:bg-green-700">Baixar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
      </div>
    </div>
  </div>
  <app-denuncia   *ngIf="isModalOpen"  (goList)="goList()" (addRegistos)="addRegistro($event)"  [selectedRegistos]="selectedRegistos"  [@fadeInOut]></app-denuncia>
