<div class="w-64 h-screen bg-gradient-to-b from-pna-blue to-blue-800 text-white shadow-lg overflow-y-auto">
  <div class="p-6">
    <!-- User Profile Section -->
    <div class="border-b border-blue-600 pb-4 mb-6">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
          </svg>
        </div>
        <div>
          <div class="text-sm font-medium">Agente PNA</div>
          <div class="text-xs text-blue-200">Sistema Ativo</div>
        </div>
      </div>
    </div>

    <!-- Navigation Menu -->
    <nav class="space-y-2">
      <a routerLink="/home"
         routerLinkActive="bg-angola-red"
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-700 transition-colors">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
          <path d="M10.707 2.293a1 1 0 00-1.414 0l-9 9a1 1 0 001.414 1.414L2 12.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-4.586l.293.293a1 1 0 001.414-1.414l-9-9z"></path>
        </svg>
        <span class="text-sm font-medium">Dashboard</span>
      </a>

      <a routerLink="/home/register-complaint"
         routerLinkActive="bg-angola-red"
         class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-700 transition-colors">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"></path>
        </svg>
        <span class="text-sm font-medium">Registrar Queixa</span>
      </a>

      <a routerLink="/home/complaint-list"
         routerLinkActive="bg-angola-red"
         class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-700 transition-colors">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path>
          <path fill-rule="evenodd" d="M4 5a2 2 0 012-2v1a1 1 0 001 1h6a1 1 0 001-1V3a2 2 0 012 2v6a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"></path>
        </svg>
        <span class="text-sm font-medium">Lista de Queixas</span>
      </a>

      <a routerLink="/home/criminal-search"
         routerLinkActive="bg-angola-red"
         class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-700 transition-colors">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"></path>
        </svg>
        <span class="text-sm font-medium">Consultar Criminoso</span>
      </a>

      <a routerLink="/home/criminal-records"
         routerLinkActive="bg-angola-red"
         class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-700 transition-colors">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
          <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3z"></path>
        </svg>
        <span class="text-sm font-medium">Ficha Criminal</span>
      </a>

      <div class="border-t border-blue-600 my-4"></div>

      <a routerLink="/home/reports"
         routerLinkActive="bg-angola-red"
         class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-700 transition-colors">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
          <path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path>
        </svg>
        <span class="text-sm font-medium">Relatórios</span>
      </a>

      <a routerLink="/home/settings"
         routerLinkActive="bg-angola-red"
         class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-700 transition-colors">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"></path>
        </svg>
        <span class="text-sm font-medium">Configurações</span>
      </a>
    </nav>

    <!-- Angola Flag -->
    <div class="mt-8 pt-6 border-t border-blue-600">
      <div class="flex items-center justify-center space-x-1">
        <div class="w-4 h-8 bg-angola-red rounded-sm"></div>
        <div class="w-4 h-8 bg-angola-black rounded-sm"></div>
        <div class="w-4 h-8 bg-angola-yellow rounded-sm"></div>
      </div>
      <div class="text-center text-xs text-blue-200 mt-2">República de Angola</div>
    </div>
  </div>
</div>
